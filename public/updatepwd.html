<!doctype html>
<html class="x-admin-sm">
<head>
    <meta charset="UTF-8">
    <title>修改密码</title>
    <meta name="renderer" content="webkit|ie-comp|ie-stand">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi"/>
    <meta http-equiv="Cache-Control" content="no-siteapp"/>
    <link rel="stylesheet" href="/staticpwd/static/css/font.css">
    <link rel="stylesheet" href="/staticpwd/static/css/login.css">
    <link rel="stylesheet" href="/staticpwd/static/css/xadmin.css">
    <script type="text/javascript" src="https://cdn.bootcss.com/jquery/3.2.1/jquery.min.js"></script>
    <script src="/staticpwd/static/lib/layui/layui.js" charset="utf-8"></script>
</head>
<body class="login-bg">

<div class="login layui-anim layui-anim-up">
    <div class="message">修改密码</div>
    <div id="darkbannerwrap"></div>

    <form method="post" class="layui-form">
        <input id="username" name="username" placeholder="账号" type="text" lay-verify="required" class="layui-input">
        <hr class="hr15">
        <input id="password" name="password" lay-verify="required" placeholder="原始密码" type="password" class="layui-input">
        <hr class="hr15">
       <input id="newpassword" name="newpassword" lay-verify="required" placeholder="新密码" type="password" class="layui-input">
        <hr class="hr15">
        <input value="确认修改" id="submit" lay-submit lay-filter="login" style="width:100%;" type="submit">
            <a href ="javascript:history.back(-1)"  style="font-size:20px; margin-left: 200px;margin-top: 20px;display:block;color:#A63D1C;text-decoration:underline;">去登录</a>
        <hr class="hr20">
    </form>
</div>

<script>
    $(function () {
            $('#submit').click(function(){

                var username = $('#username').val();
                var password = $('#password').val();
                var newpassword = $('#newpassword').val();
                if (username == '' || password == '' || newpassword == '') {
                    alert('账号或密码不能为空');
                   // layer.msg('账号或密码不能为空', {icon: 2, time: 1000});
                    return false;
                }
          
                $.ajax({
                    url: "/v1/user/updateUserPwd",
                    dataType: "json",
                    type: "post",
                    data: {
                        "username": username,
                        "password": password,
                        "newpassword":newpassword
                    },
                    success: function (returns) {
                        //  alert(JSON.stringify(returns));return false;
                        if (returns.code == 200) {
                            alert(returns.msg);
                           // layer.msg(returns.msg, {icon: 1});
                            return false;
                        } else {
                           // layer.msg(returns.msg, {icon: 2, time: 1000});
                             alert(returns.msg);
                            return false;
                        }
                    }
                });
                return false;
            })

     
    })
</script>
</body>
</html>
